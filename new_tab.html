<!DOCTYPE html>
<html>
<head>
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="new_tab.css">
</head>
<body>
  <div id="background-image-container">
    <video id="background-video" autoplay loop muted playsinline></video>
    <div id="sharp-image"></div>
  </div>
      <div class="content-overlay">
      <div class="container">
        <h1 id="potd-title"></h1>
      </div>
    </div>
  
    <div id="bottom-controls-container">
    <div id="date-navigation-container">
      <span id="arrow-left" class="arrow">&lt;</span>
      <span id="potd-date"></span>
      <span id="arrow-right" class="arrow">&gt;</span>
    </div>
    <div id="feed-selector-container">
      <button id="wikipedia-button" class="feed-button active">Wikipedia</button>
      <button id="wikimedia-button" class="feed-button">Wikimedia</button>
    </div>
  </div>
    <script type="module" src="api.js"></script>
    <script type="module" src="dom-elements.js"></script>
    <script type="module" src="state.js"></script>
    <script type="module" src="date-utils.js"></script>
    <script type="module" src="media-display.js"></script>
    <script type="module" src="event-handlers.js"></script>
    <script type="module" src="main.js"></script>
  </body>
  </html>
